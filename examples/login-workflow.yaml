# yaml-language-server: $schema=https://raw.githubusercontent.com/tomiwa-a/replay/main/schema.json
name: vendor_login_workflow
version: v0.1

config:
  http:
    base_url: https://localhost:5001
    # debug: true

steps:
  - name: login_as_vendor
    type: http
    # ignore_error: true
    request:
      method: POST
      url: /auth/login
      headers:
        x-VendorTag: "debs"
        Content-Type: application/json
      body: |
        {
          "email": "debs@gmail.com",
          "password": "Password@1234"
        }
    extract:
      access_token: res.data.data.accessToken
      status: res.status
    assert:
      - ["res.status", "==", "200"]
      - ["res.data.data.accessToken", "!=", ""]

  - name: verify_token_extraction
    type: print
    message: "Status: {{status}}, Logged in successfully. Access Token: {{access_token}}"

  - name: list_staff_members
    type: http
    request:
      method: GET
      url: /staff?page=1&pageSize=10
      headers:
        Authorization: "Bearer {{access_token}}"
        x-VendorTag: "debs"
    extract:
      staff_list: res.data.data
    assert:
      - ["res.status", "==", "200"]

  - name: show_staff_names_and_emails
    type: loop
    foreach: staff_list, staff
    steps:
      - name: print_staff_member_info
        type: print
        message: "- {{staff.firstName}} {{staff.lastName}} ({{staff.email}})"

      - name: save_staff_to_file
        type: shell
        command: "echo '- {{staff.firstName}} {{staff.lastName}} ({{staff.email}})' >> staff_list.txt"

