# yaml-language-server: $schema=https://raw.githubusercontent.com/tomiwa-a/replay/main/schema.json
name: Vendor Login Workflow
version: v0.1

config:
  http:
    base_url: https://localhost:5001
    # debug: true

steps:
  - name: Login as Vendor
    type: http
    # ignore_error: true
    request:
      method: POST
      url: /auth/login
      headers:
        x-VendorTag: "debs"
        Content-Type: application/json
      body: |
        {
          "email": "debs@gmail.com",
          "password": "Password@123"
        }
    extract:
      accessToken: res.data.data.accessToken
      status: res.status
    assert:
      - ["res.status", "==", "200"]
      - ["res.data.data.accessToken", "!=", ""]

  - name: Verify Token Extraction
    type: print
    message: "Status: {{status}}, Logged in successfully. Access Token: {{accessToken}}"

  - name: List Staff Members
    type: http
    request:
      method: GET
      url: /staff?page=1&pageSize=10
      headers:
        Authorization: "Bearer {{accessToken}}"
        x-VendorTag: "debs"
    extract:
      staffList: res.data.data
    assert:
      - ["res.status", "==", "200"]

  - name: Show Staff Names and Emails
    type: loop
    foreach: staffList, staff
    steps:
      - name: Print Staff Member Info
        type: print
        message: "- {{staff.firstName}} {{staff.lastName}} ({{staff.email}})"

      - name: Save Staff to File
        type: shell
        command: "echo '- {{staff.firstName}} {{staff.lastName}} ({{staff.email}})' >> staff_list.txt"

