name: Phase 5 Assertions Test
steps:
  - name: Set up Redis
    type: db
    engine: redis
    command: ["SET", "user:1", '{"id": 1, "name": "Alice", "score": 100}']

  - name: Validate Redis Data
    type: db
    engine: redis
    command: ["GET", "user:1"]
    extract:
      user_json: "$"
    assert:
      - ["$.name", "eq", "Alice"]
      - ["$.score", "gt", 50]

  - name: Shell Assertion
    type: shell
    command: 'echo "{\"status\": \"ok\", \"count\": 5}"'
    assert:
      - ["$.status", "eq", "ok"]
      - ["$.count", "lt", 10]

  - name: Ignore Error Test
    type: shell
    command: "exit 1"
    ignore_error: true

  - name: Print Results
    type: print
    message: "Assertions passed! User from Redis: {{user_json}}"
