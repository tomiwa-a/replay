# .goreleaser.yaml
version: 1

project_name: replay

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: .
    binary: replay
    ldflags:
      - -s -w
      - -X github.com/replay/replay/internal/version.Version={{.Version}}
      - -X github.com/replay/replay/internal/version.Commit={{.Commit}}
      - -X github.com/replay/replay/internal/version.Date={{.Date}}

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers:
  - image_templates:
      - "ghcr.io/replay/replay:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=COMMIT={{ .Commit }}"
      - "--build-arg=DATE={{ .Date }}"
    goos: linux
    goarch: amd64

  - image_templates:
      - "ghcr.io/replay/replay:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=COMMIT={{ .Commit }}"
      - "--build-arg=DATE={{ .Date }}"
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/replay/replay:{{ .Version }}"
    image_templates:
      - "ghcr.io/replay/replay:{{ .Version }}-amd64"
      - "ghcr.io/replay/replay:{{ .Version }}-arm64"
  - name_template: "ghcr.io/replay/replay:latest"
    image_templates:
      - "ghcr.io/replay/replay:{{ .Version }}-amd64"
      - "ghcr.io/replay/replay:{{ .Version }}-arm64"
